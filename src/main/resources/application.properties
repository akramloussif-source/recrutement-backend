spring.application.name=recrutement-backend
# Connexion à la base de données Oracle
spring.datasource.url=jdbc:oracle:thin:@localhost:1521:XE
spring.datasource.username=recrutement_user
spring.datasource.password=recrutement_pass
spring.datasource.driver-class-name=oracle.jdbc.OracleDriver

# Configuration JPA / Hibernate
spring.jpa.database-platform=org.hibernate.dialect.OracleDialect
# "update" permet à Spring de créer les tables tout seul dans Oracle
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

# Configuration pour l'envoi de fichiers (CV, PDF)
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

# Sécurité (JWT)
jwt.secret=recrutement_jwt_secret_key_2024_glsi_s4
jwt.expiration=86400000